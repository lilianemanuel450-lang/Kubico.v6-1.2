name: kubico
description: Plataforma Imobiliária de Angola

publish_to: 'none'
version: 6.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  fpdart: ^1.1.0
  go_router: ^14.6.3
  supabase_flutter: ^2.8.4
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.3
  dio: ^5.7.0
  geolocator: ^13.0.2
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2
  shimmer: ^3.0.0
  flutter_animate: ^4.5.2
  lottie: ^3.3.1
  intl: ^0.19.0
  url_launcher: ^6.3.1
  share_plus: ^10.1.4
  permission_handler: ^11.3.1
  connectivity_plus: ^6.1.2
  equatable: ^2.0.7
  path_provider: ^2.1.5
  sentry_flutter: ^8.13.2
  timeago: ^3.7.0
  pretty_dio_logger: ^1.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/lottie/
