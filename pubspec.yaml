name: kubico
description: Plataforma Imobiliária de Angola - Alugar, Comprar e Vender

publish_to: 'none'

version: 6.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1

  # Functional Programming
  fpdart: ^1.1.0

  # Navigation
  go_router: ^14.6.3

  # Backend
  supabase_flutter: ^2.8.4

  # Armazenamento Seguro (tokens)
  flutter_secure_storage: ^9.2.2

  # Favoritos persistentes
  shared_preferences: ^2.3.3

  # Networking
  dio: ^5.7.0
  pretty_dio_logger: ^1.4.0

  # Localização
  geolocator: ^13.0.2

  # Images
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2

  # Monitoring
  sentry_flutter: ^8.13.2

  # UI
  shimmer: ^3.0.0
  flutter_animate: ^4.5.2
  lottie: ^3.3.1

  # Utils
  intl: ^0.19.0
  timeago: ^3.7.0
  url_launcher: ^6.3.1
  share_plus: ^10.1.4
  permission_handler: ^11.3.1
  connectivity_plus: ^6.1.2
  equatable: ^2.0.7
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/lottie/
